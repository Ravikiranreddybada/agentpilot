# Server
server.port=${PORT:3000}
server.address=0.0.0.0

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/toolforge}

# JWT
app.jwt.secret=${JWT_SECRET:fallback-secret-change-in-production}
app.jwt.expiration-ms=604800000

# CORS / Frontend
app.frontend-url=${FRONTEND_URL:https://toolforge-liard.vercel.app}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_CALLBACK_URL:https://toolforge-df1j.onrender.com/auth/google/callback}

# ─── Spring AI → Groq (OpenAI-compatible) ───────────────────────────────────
# Groq exposes the same API shape as OpenAI — just override the base URL.
spring.ai.openai.api-key=${GROQ_API_KEY:dummy-groq-key}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.chat.options.max-tokens=2048

# Tavily (web search tool)
app.tavily.api-key=${TAVILY_API_KEY:dummy-tavily-key}
app.tavily.url=https://api.tavily.com/search

# Slack
app.slack.webhook-url=${SLACK_WEBHOOK_URL:dummy-slack-url}

# Logging
logging.level.com.toolforge=DEBUG
logging.level.org.springframework.boot=DEBUG
logging.level.org.springframework.ai=DEBUG
